<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro QR Generator</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div class="container">
        <div class="header">
            <select id="theme-select" onchange="applyTheme()">
                <option value="light">Light Mode</option>
                <option value="dark">Dark Mode</option>
                <option value="ocean">Ocean Blue</option>
                <option value="sunset">Sunset Orange</option>
            </select>
        </div>

        <h1>QR Generator</h1>
        <p>Enter text or a URL to generate a code.</p>

        <input type="text" id="qr-input" placeholder="Enter link here...">
        
        <div class="button-group">
            <button onclick="generateQR()" id="gen-btn">Generate</button>
            <button onclick="downloadQR()" id="download-btn" disabled>Download</button>
        </div>

        <div id="qr-display">
            </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
